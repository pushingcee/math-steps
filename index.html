<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equation Step Engine</title>
<style>
  :root{
    --paper:#fdfaf2; --grid:#cfe3ee; --ink:#2b3a55; --tile-bg:#fff;
    --accent-red:#e5484d; --accent-blue:#2f6fed; --accent-green:#2f9e6e; --accent-amber:#f5a623; --accent-paren:#8257e6;
    --shadow:0 3px 0 rgba(43,58,85,.25); --amber-shadow:0 3px 0 rgba(245,166,35,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:ui-rounded,"Hiragino Maru Gothic ProN","Quicksand","Segoe UI",system-ui,sans-serif;
    background:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px),var(--paper);
    background-size:28px 28px,28px 28px,auto;color:var(--ink);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px;
  }
  header{text-align:center;margin-bottom:14px}
  header h1{font-size:1.4rem}
  header p{font-size:.85rem;opacity:.65;margin-top:2px}
  .author{width:min(720px,100%);background:#fff;border:3px solid var(--ink);border-radius:16px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px}
  .author label{font-weight:700;font-size:.85rem;display:block;margin-bottom:6px}
  .author code{background:var(--paper);padding:1px 5px;border-radius:5px}
  textarea{width:100%;font:inherit;font-size:1rem;border:2px solid var(--ink);border-radius:10px;padding:8px 10px;resize:vertical;min-height:96px;background:var(--paper);color:var(--ink)}
  .author-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
  .chip{font-size:.8rem;padding:6px 12px;border-width:2px}
  .spacer{flex:1}
  .error-box{width:min(720px,100%);background:#fdeaea;border:3px solid var(--accent-red);border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:.92rem;line-height:1.4;display:none}
  .error-box.visible{display:block}
  .error-box strong{color:var(--accent-red)}
  .stage-wrap{position:relative;width:min(720px,100%);margin-top:8px}
  .stage{position:relative;background:rgba(255,255,255,.6);border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);min-height:200px;display:flex;align-items:center;justify-content:center;padding:48px 24px;overflow:visible}
  .equation{display:flex;align-items:center;gap:18px;font-size:clamp(1.5rem,5vw,2.5rem);font-weight:700;flex-wrap:wrap;justify-content:center}
  .side{display:flex;align-items:center;gap:10px;min-width:46px;justify-content:center;flex-wrap:wrap}
  .equals{font-size:1.05em;padding:0 4px;user-select:none}
  .op-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--accent-amber);color:#fff;font-weight:800;font-size:1rem;border-radius:999px;padding:6px 16px;box-shadow:var(--shadow);opacity:0;transition:opacity .3s ease;z-index:45}
  .op-badge.visible{opacity:1}
  .tile{position:relative;display:inline-flex;align-items:center;background:var(--tile-bg);border:3px solid var(--ink);border-radius:14px;padding:6px 16px;box-shadow:var(--shadow);will-change:transform}
  .tile .sign{margin-right:6px;color:var(--accent-blue)}
  .tile .sign.negative{color:var(--accent-red)}
  .tile.var{background:#fff7e0}
  .tile.zero{background:#f0f0f0;opacity:.85}
  /* bracket group: transparent wrapper holding bracket tiles + inner tiles */
  .tile.grp{background:transparent;border:none;box-shadow:none;padding:2px;gap:8px}
  .tile.abs{--bracket-color:var(--accent-amber);--bracket-shadow:rgba(245,166,35,.35)}
  .tile.paren{--bracket-color:var(--accent-paren);--bracket-shadow:rgba(130,87,230,.32)}
  .tile.grp .sign{color:var(--bracket-color)}
  .tile.grp .sign.negative{color:var(--accent-red)}
  .coefmul{font-weight:800;margin-right:2px}
  .brackettile{display:inline-flex;align-items:center;justify-content:center;min-width:.7em;padding:6px 10px;background:#fff;border:3px solid var(--bracket-color);border-radius:11px;box-shadow:0 3px 0 var(--bracket-shadow);color:var(--bracket-color);font-weight:800}
  .minitile{display:inline-flex;align-items:center;background:#fff;border:3px solid var(--ink);border-radius:12px;padding:4px 12px;box-shadow:var(--shadow);font-size:.9em}
  .minitile.var{background:#fff7e0}
  .tile.prod{background:transparent;border:none;box-shadow:none;padding:2px;gap:6px}
  .tile.prod .sign{color:var(--accent-blue)}
  .tile.lazyfrac{background:#eafbf2;border-color:var(--accent-green)}
  .lazyfrac .lf{display:inline-flex;flex-direction:column;align-items:center;line-height:1.05}
  .lazyfrac .lf .lfbar{width:100%;height:.11em;min-height:3px;background:var(--accent-green);border-radius:2px;margin:2px 0}
  .lazyfrac.fracsum .fsnum{display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}
  .fsnum .fsterm{display:inline-block}
  .minitile.lazyfrac.fracsum{background:#eafbf2;border:1.5px solid var(--accent-green);border-radius:8px;padding:2px 5px}
  .frac.lz .barline{background:var(--accent-green)}
  .pow-exp{font-size:.62em;vertical-align:super;line-height:0;margin-left:1px;font-weight:800}
  .grp-inline{display:inline-flex;align-items:center;gap:9px;padding:5px 7px;border-radius:14px;background:rgba(124,92,255,.06)}
  .grp-inline .sign{margin-right:2px;color:var(--bracket-color)}
  .grp-inline .sign.negative{color:var(--accent-red)}
  .grp-inline .brackettile{padding:4px 9px;border-width:2px;box-shadow:0 2px 0 var(--bracket-shadow);font-size:.95em}
  .grp-inline .minitile{font-size:.86em;padding:3px 10px}
  .mul{font-weight:800;color:var(--accent-paren);font-size:1.05em;margin:0 1px}
  .minitile .sign{margin-right:5px;color:var(--accent-blue)}
  .minitile .sign.negative{color:var(--accent-red)}
  .frac{display:inline-flex;flex-direction:column;align-items:center;font-size:.62em;line-height:1.1;vertical-align:middle;margin:0 1px}
  .frac .barline{width:100%;height:.09em;min-height:2px;background:currentColor;border-radius:2px;margin:1px 0}
  .tile.highlighted{animation:wiggle .5s ease}
  .tile.highlighted::after{content:"";position:absolute;inset:-10px;border:4px dashed var(--accent-red);border-radius:18px;animation:drawBox .4s ease-out;pointer-events:none}
  .tile.highlighted.group::after{border-color:var(--accent-amber)}
  .minitile.highlighted,.grp-inline.highlighted{position:relative}
  .minitile.highlighted::after,.grp-inline.highlighted::after{content:"";position:absolute;inset:-7px;border:3px dashed var(--accent-amber);border-radius:15px;animation:drawBox .4s ease-out;pointer-events:none}
  @keyframes drawBox{from{opacity:0;transform:scale(1.3)}to{opacity:1;transform:scale(1)}}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
  .tile.flipping{animation:flipTile .7s ease}
  @keyframes flipTile{0%{transform:rotateY(0)}50%{transform:rotateY(90deg) scale(1.1)}100%{transform:rotateY(0)}}
  .tile.celebrate{animation:pop .6s ease;border-color:var(--accent-green)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
  .flyer{position:fixed;z-index:50;margin:0;pointer-events:none}
  .arrow-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:40}
  .arrow-path{fill:none;stroke:var(--accent-red);stroke-width:4;stroke-dasharray:10 8;stroke-linecap:round;opacity:0;transition:opacity .25s ease}
  .arrow-layer.visible .arrow-path,.arrow-layer.visible .arrow-head{opacity:1}
  .arrow-head{fill:var(--accent-red);opacity:0;transition:opacity .25s ease}
  .caption{margin-top:18px;min-height:60px;width:min(720px,100%);background:#fff;border:3px solid var(--ink);border-radius:16px;box-shadow:var(--shadow);padding:12px 18px;font-size:1rem;line-height:1.45;display:flex;align-items:center;gap:12px}
  .caption .badge{flex:none;background:var(--accent-blue);color:#fff;font-weight:700;font-size:.78rem;border-radius:999px;padding:4px 12px;white-space:nowrap}
  .caption.done .badge{background:var(--accent-green)}
  .controls{margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
  button{font:inherit;font-weight:700;color:var(--ink);background:#fff;border:3px solid var(--ink);border-radius:12px;padding:9px 20px;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s ease}
  button:hover:not(:disabled){transform:translateY(-2px)}
  button:active:not(:disabled){transform:translateY(1px);box-shadow:none}
  button:disabled{opacity:.4;cursor:default}
  button.primary{background:var(--accent-blue);color:#fff;border-color:var(--accent-blue)}
  .dots{display:flex;gap:7px;flex-wrap:wrap;max-width:280px}
  .dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--ink);background:transparent}
  .dot.done{background:var(--accent-green);border-color:var(--accent-green)}
  .dot.current{background:var(--accent-blue);border-color:var(--accent-blue)}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}}
</style>
</head>
<body>
<header>
  <h1>Equation Step Engine</h1>
  <p>Give it the states &mdash; it infers and animates the steps in between</p>
</header>
<div class="author">
  <label for="statesInput">States, one per line. Supports <code>=</code> <code>&lt;</code> <code>&gt;</code> <code>&lt;=</code> <code>&gt;=</code>, fractions <code>1/2</code>, absolute value <code>|3-4|</code>, eager fractions <code>1/2</code> vs lazy <code>1//2</code>, multiplication <code>*</code>, and powers <code>x^2</code>:</label>
  <textarea id="statesInput" spellcheck="false">2(2 + (x + 3)) = 10
2(2 + x + 3) = 10
2(x + 5) = 10
2x + 10 = 10
2x = 0
x = 0</textarea>
  <div class="author-row">
    <button class="chip" data-example="plain">Plain</button>
    <button class="chip" data-example="abs">Absolute value</button>
    <button class="chip" data-example="paren">Brackets</button>
    <button class="chip" data-example="ineqPos">Inequality</button>
    <button class="chip" data-example="ineqNeg">Negative flip</button>
    <button class="chip" data-example="nested">Nested brackets</button>
    <button class="chip" data-example="quad">Difference of squares</button>
    <button class="chip" data-example="squareIneq">Squared binomials</button>
    <button class="chip" data-example="lazy">Lazy arithmetic</button>
    <button class="chip" data-example="addFrac">Add fractions</button>
    <button class="chip" data-example="autofill">Auto-fill</button>
    <button class="chip" data-example="likeTerms">Like terms</button>
    <button class="chip" data-example="bad">Catch a mistake</button>
    <span class="spacer"></span>
    <button id="btnBuild" class="primary">Build lesson</button>
  </div>
</div>
<div class="error-box" id="errorBox"></div>
<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="op-badge" id="opBadge"></div>
    <svg class="arrow-layer" id="arrowLayer">
      <path class="arrow-path" id="arrowPath" d=""></path>
      <polygon class="arrow-head" id="arrowHead" points=""></polygon>
    </svg>
    <div class="equation" id="equation"></div>
  </div>
</div>
<div class="caption" id="caption">
  <span class="badge" id="captionBadge">Start</span>
  <span id="captionText"></span>
</div>
<div class="controls">
  <button id="btnPrev">&#8592; Back</button>
  <div class="dots" id="dots"></div>
  <button id="btnNext" class="primary">Next &#8594;</button>
  <button id="btnReplay">&#8635; Replay</button>
</div>
<script>
/* =====================================================================
 * RATIONALS
 * =================================================================== */
function gcd(a, b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a||1; }
function R(n, d=1){ if(d===0) throw new Error('Division by zero in a coefficient.'); if(d<0){n=-n;d=-d;} const g=gcd(n,d); return {n:n/g,d:d/g}; }
const radd=(a,b)=>R(a.n*b.d+b.n*a.d, a.d*b.d);
const rmul=(a,b)=>R(a.n*b.n, a.d*b.d);
const rdiv=(a,b)=>R(a.n*b.d, a.d*b.n);
const rneg=(a)=>R(-a.n,a.d);
const req=(a,b)=>a.n===b.n&&a.d===b.d;
const rzero=(a)=>a.n===0;
const rnegq=(a)=>a.n<0;
const risInt=(a)=>a.d===1;
const rabs=(a)=>R(Math.abs(a.n),a.d);
const rstr=(a)=>a.d===1?String(a.n):`${a.n}/${a.d}`;
const RONE=R(1), RNEGONE=R(-1), RZERO=R(0);
function decimalToRational(s){ if(!s.includes('.')) return R(parseInt(s,10)); const [i,f]=s.split('.'); const d=Math.pow(10,f.length); return R(parseInt((i||'0')+f,10), d); }

/* =====================================================================
 * RELATIONS
 * =================================================================== */
const flipRel=(r)=>({'<':'>','>':'<','<=':'>=','>=':'<=','=':'='}[r]);
const relStr=(r)=>({'<':'<','>':'>','<=':'\u2264','>=':'\u2265','=':'='}[r]);

/* =====================================================================
 * PARSER  (supports 2x, -x, 1/2, 0.5, 3/4x, |3-4|, 2|x|, relations)
 * State: { left:Term[], rel:'='|'<'|'>'|'<='|'>='|null, right:Term[]|null }
 * Term:  { kind:'num', coef, sym } | { kind:'abs', coef, inner:Term[] }
 * =================================================================== */
function parseStatement(str, lineNo){
  let s = str.replace(/[\u2212\u2013\u2014]/g,'-').replace(/\u2264/g,'<=').replace(/\u2265/g,'>=').trim();
  let rel=null, idx=-1, opLen=0;
  for(let i=0;i<s.length;i++){
    const two=s.slice(i,i+2);
    if(two==='<='||two==='>='){ rel=two; idx=i; opLen=2; break; }
    const one=s[i];
    if(one==='='||one==='<'||one==='>'){ rel=one; idx=i; opLen=1; break; }
  }
  if(rel===null) return { left: parseSide(s, lineNo), rel:null, right:null };
  const L=s.slice(0,idx), Rr=s.slice(idx+opLen);
  return { left: parseSide(L, lineNo), rel, right: parseSide(Rr, lineNo) };
}

function parseNumber(s){
  if(s==='') return RONE;
  if(s.includes('/')){ const [a,b]=s.split('/'); if(a===''||b===''||b===undefined) return null; return rdiv(decimalToRational(a), decimalToRational(b)); }
  return decimalToRational(s);
}

function splitTerms(src, lineNo){
  const terms=[]; let cur=''; let inBars=false; let depth=0;
  for(let i=0;i<src.length;i++){
    const c=src[i];
    if(c==='|'){ inBars=!inBars; cur+=c; }
    else if(c==='('){ depth++; cur+=c; }
    else if(c===')'){ depth--; if(depth<0) throw new Error(`Line ${lineNo}: unmatched ) parenthesis.`); cur+=c; }
    else if((c==='+'||c==='-') && !inBars && depth===0 && cur!==''){ terms.push(cur); cur=c; }
    else cur+=c;
  }
  if(inBars) throw new Error(`Line ${lineNo}: unmatched | in an absolute value.`);
  if(depth!==0) throw new Error(`Line ${lineNo}: unmatched ( parenthesis.`);
  if(cur!=='') terms.push(cur);
  return terms;
}

const NUMRE=/^(?:\d+(?:\.\d+)?|\.\d+)(?:\/(?:\d+(?:\.\d+)?|\.\d+))?$/;
function splitTopLevel(str, op){
  const parts=[]; let cur=''; let depth=0; let inBars=false;
  for(let i=0;i<str.length;i++){
    const c=str[i];
    if(c==='|'){ inBars=!inBars; cur+=c; continue; }
    if(c==='('){ depth++; cur+=c; continue; }
    if(c===')'){ depth--; cur+=c; continue; }
    if(depth===0 && !inBars){
      if(op==='*' && c==='*'){ parts.push(cur); cur=''; continue; }
      if(op==='//' && c==='/' && str[i+1]==='/'){ parts.push(cur); cur=''; i++; continue; }
    }
    cur+=c;
  }
  parts.push(cur);
  return parts;
}
function signedNumber(s, lineNo){
  let sg=1, r=s;
  while(r[0]==='+'||r[0]==='-'){ if(r[0]==='-') sg*=-1; r=r.slice(1); }
  if(!NUMRE.test(r)) throw new Error(`Line ${lineNo}: "${s}" is not a number in a // fraction.`);
  let v=parseNumber(r); if(v===null) throw new Error(`Line ${lineNo}: bad number "${s}".`);
  return sg<0?rneg(v):v;
}
function parseFactor(str, lineNo){
  const fp=splitTopLevel(str,'//');
  if(fp.length>1){
    if(fp.length!==2) throw new Error(`Line ${lineNo}: only a simple a//b lazy fraction is supported.`);
    const num=signedNumber(fp[0],lineNo), den=signedNumber(fp[1],lineNo);
    if(rzero(den)) throw new Error(`Line ${lineNo}: division by zero in "${str}".`);
    return {kind:'frac', num, den};
  }
  return parseTerm(str, lineNo);
}
function parseTerm(tok, lineNo){
  let sign=1, rest=tok;
  while(rest[0]==='+'||rest[0]==='-'){ if(rest[0]==='-') sign*=-1; rest=rest.slice(1); }
  const numRe=NUMRE;
  // product of factors (lazy *)
  const mulParts=splitTopLevel(rest,'*');
  if(mulParts.length>1){
    const factors=mulParts.map(p=>parseFactor(p, lineNo));
    return { kind:'mul', coef:R(sign), factors };
  }
  // lazy fraction (//)
  const fracParts=splitTopLevel(rest,'//');
  if(fracParts.length>1){
    if(fracParts.length!==2) throw new Error(`Line ${lineNo}: only a simple a//b lazy fraction is supported.`);
    const den=signedNumber(fracParts[1],lineNo);
    if(rzero(den)) throw new Error(`Line ${lineNo}: division by zero in "${tok}".`);
    let numStr=fracParts[0].trim(), nsg=1;
    while(numStr[0]==='+'||numStr[0]==='-'){ if(numStr[0]==='-') nsg*=-1; numStr=numStr.slice(1).trim(); }
    if(numStr[0]==='(' && numStr[numStr.length-1]===')'){
      let depth=0, wraps=true;
      for(let k=0;k<numStr.length;k++){ if(numStr[k]==='(')depth++; else if(numStr[k]===')'){depth--; if(depth===0 && k<numStr.length-1){wraps=false;break;}} }
      if(wraps){ const numTerms=parseSide(numStr.slice(1,-1), lineNo); return { kind:'fracsum', coef:R(sign*nsg), numTerms, den }; }
    }
    let num=signedNumber(fracParts[0],lineNo);
    if(sign<0) num=rneg(num);
    return { kind:'frac', num, den };
  }
  // power: base ^ integer  (x^2, 7^2, 3x^2, -x^2) — no parenthesised base
  if(rest.indexOf('^')>=0 && !rest.includes('(') && !rest.includes('|')){
    const ci=rest.indexOf('^');
    const baseStr=rest.slice(0,ci), expStr=rest.slice(ci+1);
    if(!/^\d+$/.test(expStr)) throw new Error(`Line ${lineNo}: the exponent in "${tok}" must be a positive whole number.`);
    const exp=parseInt(expStr,10);
    const bm=/^((?:\d+(?:\.\d+)?)?)([a-zA-Z]?)$/.exec(baseStr);
    if(!bm || (bm[1]===''&&bm[2]==='')) throw new Error(`Line ${lineNo}: can't read the base "${baseStr}" in "${tok}".`);
    let coef=RONE, base=RONE, sym='';
    if(bm[2]){ sym=bm[2]; coef=bm[1]===''?RONE:parseNumber(bm[1]); }
    else { base=parseNumber(bm[1]); }
    if(coef===null||base===null) throw new Error(`Line ${lineNo}: bad number in "${tok}".`);
    if(sign<0) coef=rneg(coef);
    return { kind:'pow', coef, sym, base, exp };
  }
  if(rest.includes('(')){
    const first=rest.indexOf('(');
    // find the matching close paren for the first open (supports nesting)
    let depth=0, last=-1;
    for(let i=first;i<rest.length;i++){ if(rest[i]==='(') depth++; else if(rest[i]===')'){ depth--; if(depth===0){ last=i; break; } } }
    if(last<0) throw new Error(`Line ${lineNo}: unbalanced parentheses in "${tok}".`);
    const coefStr=rest.slice(0,first), innerStr=rest.slice(first+1,last); let after=rest.slice(last+1);
    if(coefStr!=='' && !numRe.test(coefStr)) throw new Error(`Line ${lineNo}: bad coefficient "${coefStr}" before the parentheses.`);
    let coef = coefStr===''?RONE:parseNumber(coefStr);
    if(coef===null) throw new Error(`Line ${lineNo}: bad coefficient "${coefStr}".`);
    if(sign<0) coef=rneg(coef);
    const inner=parseSide(innerStr, lineNo);
    if(inner.some(t=>t.kind==='abs')) throw new Error(`Line ${lineNo}: brackets can't contain | | absolute values.`);
    // (..)^n  -> squared/powered bracket
    let powExp=null;
    const pm=/^\^(\d+)$/.exec(after);
    if(pm){ powExp=parseInt(pm[1],10); after=''; }
    // (..)/n  -> bracket over a number (coefficient 1/n)
    const dm=/^\/(\d+(?:\.\d+)?)$/.exec(after);
    if(dm){ const d=parseNumber(dm[1]); if(d===null||rzero(d)) throw new Error(`Line ${lineNo}: bad divisor in "${tok}".`); coef=rdiv(coef,d); after=''; }
    if(after!=='') throw new Error(`Line ${lineNo}: can't read "${after}" after the parentheses (use * between brackets, e.g. (a)*(b)).`);
    if(powExp!==null) return { kind:'pow', coef, paren:inner, exp:powExp, sym:'' };
    return { kind:'paren', coef, inner };
  }
  if(rest.includes('|')){
    const bars=(rest.match(/\|/g)||[]).length;
    if(bars!==2) throw new Error(`Line ${lineNo}: only simple |...| absolute values are supported (no nesting).`);
    const first=rest.indexOf('|'), last=rest.lastIndexOf('|');
    const coefStr=rest.slice(0,first), innerStr=rest.slice(first+1,last), after=rest.slice(last+1);
    if(after!=='') throw new Error(`Line ${lineNo}: can't read "${after}" after the bars.`);
    if(coefStr!=='' && !numRe.test(coefStr)) throw new Error(`Line ${lineNo}: bad number "${coefStr}" before the bars.`);
    let coef = coefStr===''?RONE:parseNumber(coefStr);
    if(coef===null) throw new Error(`Line ${lineNo}: bad number "${coefStr}" before the bars.`);

function strictTermEq(a,b){
  if(a.kind!==b.kind) return false;

  if(a.kind==='frac') return req(a.num,b.num)&&req(a.den,b.den);

function bridge(P, Q){

    if(matches(nxt,Q)) return path;  // reached Q; intermediates are in `path`
    path.push(nxt);
    cur=nxt;
  }
  return null;
}

const BRACKETS={ abs:['|','|'], paren:['(',')'] };

function mkMulFactorHTML(f){

function innerFactorHTML(t,isFirst){

function mkPowTile(t,isFirst){

function mkTile(t,isFirst){ if(t.kind==='pow') return mkPowTile(t,isFirst); if(t.kind==='abs'||t.kind==='paren') return mkGroupTile(t,isFirst); if(t.kind==='prod') return mkProdTile(t,isFirst); if(t.kind==='fracsum') return mkFracSumTile(t,isFirst); if(t.kind==='frac') return mkFracTile(t,isFirst); if(t.kind==='mul') return mkMulTile(t,isFirst); return mkNumTile(t,isFirst); }
function mkSide(terms,cls){

function renderState(state){

function tileEl(id){ return eqEl.querySelector(`[data-term-id="${id}"]`); }
function clearHighlights(){ eqEl.querySelectorAll('.highlighted').forEach(t=>t.classList.remove('highlighted','group')); }

async function transitionTo(newState,{hideTermId=null,duration=500}={}){
  const oldRects={}; eqEl.querySelectorAll('.tile').forEach(t=>oldRects[t.dataset.termId]=t.getBoundingClientRect());
  renderState(newState);
  const anims=[];
  eqEl.querySelectorAll('.tile').forEach(t=>{
    const id=t.dataset.termId;
    if(hideTermId===id){ t.style.visibility='hidden'; return; }
    const o=oldRects[id];
    if(!o){ anims.push(t.animate([{opacity:0,transform:'scale(.5)'},{opacity:1,transform:'scale(1)'}],{duration,easing:'ease-out'}).finished); return; }
    const n=t.getBoundingClientRect(); const dx=o.left-n.left, dy=o.top-n.top;
    if(dx||dy) anims.push(t.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:'translate(0,0)'}],{duration,easing:'cubic-bezier(.4,0,.2,1)'}).finished);
  });
  await Promise.all(anims);
}
function showArrow(fromRect,toRect){
  const s=stage.getBoundingClientRect();
  const x1=fromRect.left+fromRect.width/2-s.left, y1=fromRect.top-s.top-8;
  const x2=toRect.left+toRect.width/2-s.left, y2=toRect.top-s.top-8;
  const cx=(x1+x2)/2, cy=Math.min(y1,y2)-70;
  arrowPath.setAttribute('d',`M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
  const tx=x2-cx, ty=y2-cy, len=Math.hypot(tx,ty)||1, ux=tx/len, uy=ty/len, sz=12, px=-uy, py=ux;
  arrowHead.setAttribute('points',`${x2},${y2} ${x2-ux*sz+px*sz*.6},${y2-uy*sz+py*sz*.6} ${x2-ux*sz-px*sz*.6},${y2-uy*sz-py*sz*.6}`);
  arrowLayer.classList.add('visible');
}
function hideArrow(){ arrowLayer.classList.remove('visible'); }

async function flyTile(termId,newState,duration=900){
  const source=tileEl(termId); const fromRect=source.getBoundingClientRect();
  const flyer=source.cloneNode(true); flyer.classList.add('flyer'); flyer.classList.remove('highlighted');
  flyer.style.left=fromRect.left+'px'; flyer.style.top=fromRect.top+'px';
  document.body.appendChild(flyer); source.style.visibility='hidden';
  await transitionTo(newState,{hideTermId:termId,duration:400});
  const dest=tileEl(termId); const toRect=dest.getBoundingClientRect();
  showArrow(fromRect,toRect);
  const x1=fromRect.left,y1=fromRect.top,x2=toRect.left,y2=toRect.top,cx=(x1+x2)/2,cy=Math.min(y1,y2)-90;
  const start=performance.now();
  await new Promise(res=>{ function f(now){ let t=Math.min((now-start)/duration,1); const e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; const mt=1-e;
    flyer.style.left=(mt*mt*x1+2*mt*e*cx+e*e*x2)+'px'; flyer.style.top=(mt*mt*y1+2*mt*e*cy+e*e*y2)+'px'; flyer.style.transform=`rotate(${Math.sin(e*Math.PI)*12}deg)`;
    if(t<1) requestAnimationFrame(f); else res(); } requestAnimationFrame(f); });
  flyer.remove(); dest.style.visibility='visible';
  dest.animate([{transform:'scale(1.15)'},{transform:'scale(1)'}],{duration:250,easing:'ease-out'});
  await sleep(450); hideArrow();
}

const executors={
  async highlight(step){ step.termIds.forEach(id=>{ const t=tileEl(id)||eqEl.querySelector(`[data-inner-id="${id}"]`); if(t){ t.classList.add('highlighted'); if(step.group) t.classList.add('group'); } }); await sleep(900); },

      anims.push(t.animate([{transform:'scale(1)',opacity:1},{transform:'translateY(-10px) scale(1.1)',opacity:1,offset:.4},{transform:'translateY(0) scale(.4)',opacity:0}],{duration:620,easing:'ease-in',fill:'forwards'}).finished); }

      if(minis.length>1){ const tg=minis[0].getBoundingClientRect(); const a=[]; for(let i=1;i<minis.length;i++){ const r=minis[i].getBoundingClientRect(); a.push(minis[i].animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${tg.left-r.left}px,${tg.top-r.top}px) scale(.5)`,opacity:0}],{duration:480,fill:'forwards'}).finished); } await Promise.all(a); }

    renderState(step.after);
    const n=tileEl(step.termId);
    if(n){ n.style.borderColor='var(--accent-green)'; n.animate([{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:380,easing:'ease-out'}); setTimeout(()=>{ if(n) n.style.borderColor=''; },680); }
    await sleep(460);
  },
  async distribute(step){
    // brackets fade; inner tiles fly OUT to their distributed positions
    clearHighlights();
    const old={};
    eqEl.querySelectorAll('.tile[data-term-id]').forEach(t=>old[t.dataset.termId]=t.getBoundingClientRect());
    eqEl.querySelectorAll('.minitile[data-inner-id]').forEach(m=>old[m.dataset.innerId]=m.getBoundingClientRect());
    const container=tileEl(step.parenId);
    if(container) container.querySelectorAll('.brackettile').forEach((b,i)=>b.animate([{opacity:1,transform:'scale(1)'},{opacity:0,transform:`scale(.4) translateX(${i===0?-12:12}px)`}],{duration:340,easing:'ease-in',fill:'forwards'}));
    await sleep(300);
    renderState(step.after);
    const anims=[];
    eqEl.querySelectorAll('.tile[data-term-id]').forEach(t=>{
      const id=t.dataset.termId; const o=old[id]; const n=t.getBoundingClientRect();
      if(o){ const dx=o.left-n.left, dy=o.top-n.top; if(dx||dy) anims.push(t.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:'translate(0,0)'}],{duration:620,easing:'cubic-bezier(.34,1.3,.5,1)'}).finished); }
      else anims.push(t.animate([{opacity:0,transform:'scale(.5)'},{opacity:1,transform:'scale(1)'}],{duration:520,easing:'ease-out'}).finished);
      if(step.distributedIds.includes(id)) t.animate([{transform:'scale(1.3)'},{transform:'scale(1)'}],{duration:560,easing:'ease-out'});
    });
    await Promise.all(anims); await sleep(260);
  },
  async multiply(step){
    clearHighlights();
    const before=tileEl(step.termId); if(before) before.classList.add('flipping');
    await sleep(360); renderState(step.after);
    const after=tileEl(step.termId);
    if(after){ after.style.borderColor='var(--accent-green)'; after.animate([{transform:'scale(1.2)'},{transform:'scale(1)'}],{duration:380,easing:'ease-out'}); setTimeout(()=>{ if(after) after.style.borderColor=''; },640); }
    await sleep(420);
  },
  async evalFrac(step){
    clearHighlights();
    const before=tileEl(step.termId);
    if(before){ const lf=before.querySelector('.lf'); if(lf) lf.animate([{transform:'scale(1)'},{transform:'scale(1.15)'},{transform:'scale(.7)',opacity:.4}],{duration:380,easing:'ease-in',fill:'forwards'}); }
    await sleep(400); renderState(step.after);
    const after=tileEl(step.termId);
    if(after){ after.style.borderColor='var(--accent-green)'; after.animate([{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:380,easing:'ease-out'}); setTimeout(()=>{ if(after) after.style.borderColor=''; },640); }
    await sleep(440);
  },
  async rewritePower(step){
    clearHighlights(); const before=tileEl(step.termId); if(before) before.classList.add('flipping');
    await sleep(340); renderState(step.after);
    const after=tileEl(step.termId);
    if(after){ after.style.borderColor='var(--accent-purple)'; after.animate([{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:380,easing:'ease-out'}); setTimeout(()=>{ if(after) after.style.borderColor=''; },640); }
    await sleep(420);
  },
  async evalPower(step){ await this.rewritePower(step); },
  async reorderFactors(step){
    clearHighlights(); const el=tileEl(step.termId);
    if(el) el.animate([{transform:'translateX(0)'},{transform:'translateX(-6px) rotate(-1deg)'},{transform:'translateX(6px) rotate(1deg)'},{transform:'translateX(0)'}],{duration:460,easing:'ease-in-out'});
    await sleep(360); renderState(step.after);
    const a2=tileEl(step.after[step.side==='right'?'right':'left'] ? step.termId : step.termId);
    const t2=tileEl(step.termId); if(t2) t2.animate([{transform:'scale(1.08)'},{transform:'scale(1)'}],{duration:300,easing:'ease-out'});
    await sleep(360);
  },
  async factor(step){
    clearHighlights();
    (step.termIds||[]).forEach(id=>{ const e=tileEl(id); if(e){ e.classList.add('highlight'); } });
    await sleep(820); // let the a^2-b^2 rule caption read
    (step.termIds||[]).forEach(id=>{ const e=tileEl(id); if(e) e.animate([{opacity:1},{opacity:0}],{duration:300,fill:'forwards'}); });
    await sleep(300); renderState(step.after);
    // pulse the new product tile (last term on the side, the mul)
    const tiles=[...eqEl.querySelectorAll('.tile.prod')]; const prod=tiles[tiles.length-1];
    if(prod){ prod.style.borderColor='var(--accent-green)'; prod.animate([{transform:'scale(.7)',opacity:.3},{transform:'scale(1.12)',opacity:1},{transform:'scale(1)'}],{duration:520,easing:'ease-out'}); setTimeout(()=>{ if(prod) prod.style.borderColor=''; },760); }
    await sleep(560);
  },
  async expand(step){
    clearHighlights(); const before=tileEl(step.termId);
    if(before){ before.classList.add('highlight'); before.animate([{opacity:1},{opacity:0}],{duration:340,fill:'forwards'}); }
    await sleep(420); renderState(step.after);
    eqEl.querySelectorAll('.tile').forEach((e,i)=>{ e.animate([{transform:'scale(.85)',opacity:.4},{transform:'scale(1)',opacity:1}],{duration:380,delay:i*40,easing:'ease-out'}); });
    await sleep(520);
  },
  async reorderInside(step){
    clearHighlights();
    const before={}; eqEl.querySelectorAll('[data-inner-id]').forEach(e=>{ before[e.dataset.innerId]=e.getBoundingClientRect(); });
    renderState(step.after);
    eqEl.querySelectorAll('[data-inner-id]').forEach(e=>{ const b=before[e.dataset.innerId]; if(!b) return; const a=e.getBoundingClientRect(); const dx=b.left-a.left, dy=b.top-a.top; if(dx||dy) e.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:'translate(0,0)'}],{duration:500,easing:'cubic-bezier(.4,0,.2,1)'}); });
    await sleep(580);
  },
  async flatten(step){
    clearHighlights(); const sub=eqEl.querySelector(`[data-inner-id="${step.subId}"]`);
    if(sub){ sub.querySelectorAll('.brackettile').forEach(b=>b.animate([{opacity:1,transform:'scale(1)'},{opacity:.15,transform:'scale(.6)'}],{duration:420,fill:'forwards'})); }
    await sleep(460);
    await sleep(240); renderState(step.after);
    const parent=tileEl(step.parenId);
    if(parent) parent.animate([{transform:'scale(1.05)'},{transform:'scale(1)'}],{duration:320,easing:'ease-out'});
    await sleep(360);
  },
  async evalProducts(step){
    // each "a\u00b7b" product computes to a single number, in place
    clearHighlights();
    step.prodIds.forEach(id=>{ const t=tileEl(id); if(t) t.classList.add('flipping'); });
    await sleep(350);
    await transitionTo(step.after,{duration:380});
    step.prodIds.forEach(id=>{ const t=tileEl(id); if(t){ t.style.borderColor='var(--accent-green)'; t.animate([{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:340,easing:'ease-out'}); setTimeout(()=>{ if(t) t.style.borderColor=''; },560); } });
    await sleep(400);
  },
  async negateBoth(step){
    clearHighlights(); showOpBadge(step.op); eqEl.querySelectorAll('.tile').forEach(t=>t.classList.add('flipping')); await sleep(350);
    renderState(step.after); eqEl.querySelectorAll('.tile .sign').forEach(s=>s.animate([{transform:'scale(2)'},{transform:'scale(1)'}],{duration:400,easing:'ease-out'})); await sleep(500);
  },
  async scaleBoth(step){
    clearHighlights(); showOpBadge(step.op);
    eqEl.querySelectorAll('.tile').forEach(t=>t.animate([{transform:'scale(1)'},{transform:'scale(.8)'},{transform:'scale(1)'}],{duration:600,easing:'ease-in-out'}));
    await sleep(300); await transitionTo(step.after,{duration:400}); await sleep(400);
  },
  async reorder(step){ clearHighlights(); await transitionTo(step.after,{duration:650}); await sleep(220); },
  async swapSides(step){ clearHighlights(); await transitionTo(step.after,{duration:700}); },
  async expandSquare(step){
    // the squared bracket multiplies itself out: (x+4)\u00b2 \u2192 x\u00b2+8x+16 (or 2(x\u00b2+8x+16))
    clearHighlights();
    const before=tileEl(step.termId);
    if(before){ before.classList.add('flipping'); before.animate([{transform:'scale(1)'},{transform:'scale(1.12)'},{transform:'scale(1)'}],{duration:380,easing:'ease-in-out'}); }
    await sleep(400);
    renderState(step.after);
    const after=tileEl(step.termId);
    if(after){ // shape B: the expansion stays in a bracket and keeps the id \u2014 pulse in place
      after.animate([{transform:'scale(.7)',opacity:.4},{transform:'scale(1.14)',opacity:1},{transform:'scale(1)'}],{duration:500,easing:'ease-out'});
      after.querySelectorAll('.brackettile').forEach(b=>b.animate([{boxShadow:'0 3px 0 var(--bracket-shadow)'},{boxShadow:'0 0 0 4px var(--accent-paren)'},{boxShadow:'0 3px 0 var(--bracket-shadow)'}],{duration:560,easing:'ease-out'}));
    } else { // shape A: the trinomial terms pop in
      eqEl.querySelectorAll('.tile').forEach((e,i)=>e.animate([{transform:'scale(.82)',opacity:.35},{transform:'scale(1)',opacity:1}],{duration:380,delay:i*45,easing:'ease-out'}));
    }
    await sleep(500);
  },
  async commonDenom(step){
    // fractions are rescaled to a shared denominator \u2014 they morph in place, then pulse
    clearHighlights();
    await transitionTo(step.after,{duration:520});
    (step.fracIds||[]).forEach(id=>{ const t=tileEl(id)||eqEl.querySelector(`[data-inner-id="${id}"]`); if(!t) return;
      if(t.dataset.termId){ t.style.borderColor='var(--accent-green)'; setTimeout(()=>{ if(t) t.style.borderColor=''; },760); }
      t.animate([{transform:'scale(1)'},{transform:'scale(1.16)'},{transform:'scale(1)'}],{duration:560,easing:'ease-out'}); });
    await sleep(580);
  },
  async combineFractions(step){
    // same-denominator fractions: mark the shared denominators, then slide both numerators onto one bar
    clearHighlights();
    const find=(id)=> tileEl(id)||eqEl.querySelector(`[data-inner-id="${id}"]`);
    const srcs=(step.sourceIds||[]).map(find).filter(Boolean);
    srcs.forEach(e=>{ const lf=e.querySelector('.lf'); const den=lf?lf.lastElementChild:null; if(den){ den.style.color='var(--accent-green)'; den.animate([{transform:'scale(1)'},{transform:'scale(1.45)'},{transform:'scale(1.15)'}],{duration:620,easing:'ease-out',fill:'forwards'}); } });
    await sleep(720);
    const surv=find(step.resultId);
    if(surv){ const tg=surv.getBoundingClientRect(); const anims=[];
      srcs.forEach(e=>{ if(e===surv) return; const r=e.getBoundingClientRect();
        anims.push(e.animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${tg.left-r.left}px,${tg.top-r.top}px) scale(.62)`,opacity:0}],{duration:520,easing:'ease-in',fill:'forwards'}).finished); });
      await Promise.all(anims);
    }
    renderState(step.after);
    const res=find(step.resultId);
    if(res){ if(res.dataset.termId){ res.style.borderColor='var(--accent-green)'; setTimeout(()=>{ if(res) res.style.borderColor=''; },820); }
      res.animate([{transform:'scale(.55)',opacity:.3},{transform:'scale(1.16)',opacity:1},{transform:'scale(1)'}],{duration:540,easing:'ease-out'});
      const num=res.querySelector('.fsnum'); if(num) num.querySelectorAll('.fsterm').forEach((ft,i)=>ft.animate([{opacity:0,transform:'translateY(-6px)'},{opacity:1,transform:'translateY(0)'}],{duration:420,delay:120+i*90,easing:'ease-out'})); }
    await sleep(620);
  },
  async evalNumerator(step){
    // the unevaluated numerator sum (7 + 2) collapses to a single value (9)
    clearHighlights();
    const find=(id)=> tileEl(id)||eqEl.querySelector(`[data-inner-id="${id}"]`);
    const fs=find(step.fracsumId);
    if(fs){ const terms=[...fs.querySelectorAll('.fsterm')];
      if(terms.length>1){ const tg=terms[0].getBoundingClientRect(); const anims=[];
        for(let i=1;i<terms.length;i++){ const r=terms[i].getBoundingClientRect();
          anims.push(terms[i].animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${tg.left-r.left}px,0) scale(.5)`,opacity:0}],{duration:460,easing:'ease-in',fill:'forwards'}).finished); }
        await Promise.all(anims);
      }
    }
    renderState(step.after);
    const after=find(step.fracsumId);
    if(after){ if(after.dataset.termId){ after.style.borderColor='var(--accent-green)'; setTimeout(()=>{ if(after) after.style.borderColor=''; },720); }
      const lf=after.querySelector('.lf'); if(lf) lf.animate([{transform:'scale(1.18)'},{transform:'scale(1)'}],{duration:380,easing:'ease-out'}); }
    await sleep(460);
  },
  async unwrap(step){
    // only one term left inside \u2014 the brackets fade and it stands on its own
    clearHighlights();
    const c=tileEl(step.parenId);
    if(c){ c.querySelectorAll('.brackettile').forEach((b,i)=>b.animate([{opacity:1,transform:'scale(1) translateX(0)'},{opacity:0,transform:`scale(.4) translateX(${i===0?-12:12}px)`}],{duration:380,easing:'ease-in',fill:'forwards'})); }
    await sleep(400);
    renderState(step.after);
    const n=tileEl(step.parenId);
    if(n) n.animate([{transform:'scale(1.12)'},{transform:'scale(1)'}],{duration:340,easing:'ease-out'});
    await sleep(340);
  },
  async celebrate(){ eqEl.querySelectorAll('.tile').forEach(t=>t.classList.add('celebrate')); await sleep(600); }
};

/* =====================================================================
 * CONTROLLER
 * =================================================================== */
function stateAt(index){ let s=lesson.initial; for(let i=0;i<=index;i++) if(lesson.steps[i].after) s=lesson.steps[i].after; return s; }
function renderDots(){ dotsEl.innerHTML=''; if(!lesson) return; lesson.steps.forEach((_,i)=>{ const d=document.createElement('span'); d.className='dot'+(i<stepIndex?' done':i===stepIndex?' current':''); dotsEl.appendChild(d); }); }
function setCaption(text,badge,done=false){ captionText.textContent=text; captionBadge.textContent=badge; captionEl.classList.toggle('done',done); }
function updateButtons(){ const no=!lesson; btnPrev.disabled=no||animating||stepIndex<0; btnNext.disabled=no||animating||(lesson&&stepIndex>=lesson.steps.length-1); btnReplay.disabled=no||animating; }

async function next(){ if(!lesson||animating||stepIndex>=lesson.steps.length-1) return; animating=true; updateButtons(); stepIndex++;
  const step=lesson.steps[stepIndex]; const last=stepIndex===lesson.steps.length-1;
  setCaption(step.caption,`Step ${stepIndex+1} / ${lesson.steps.length}`,last); renderDots();
  await executors[step.type](step); animating=false; updateButtons(); }
function prev(){ if(!lesson||animating||stepIndex<0) return; stepIndex--; hideArrow(); opBadge.classList.remove('visible'); renderState(stateAt(stepIndex));
  if(stepIndex>=0){ const step=lesson.steps[stepIndex]; setCaption(step.caption,`Step ${stepIndex+1} / ${lesson.steps.length}`,stepIndex===lesson.steps.length-1);
    if(step.type==='highlight') step.termIds.forEach(id=>{ const t=tileEl(id); if(t){ t.classList.add('highlighted'); if(step.group) t.classList.add('group'); } }); }
  else setCaption('Press Next to begin.','Start'); renderDots(); updateButtons(); }
function replay(){ if(!lesson||animating) return; stepIndex=-1; hideArrow(); opBadge.classList.remove('visible'); renderState(lesson.initial); setCaption('Press Next to begin.','Start'); renderDots(); updateButtons(); }

function build(){ errorBox.classList.remove('visible'); const lines=statesInput.value.split('\n').map(s=>s.trim()).filter(Boolean);
  try{ lesson=plan(lines); replay(); }
  catch(e){ lesson=null; eqEl.innerHTML=''; dotsEl.innerHTML=''; setCaption('Fix the states above, then press Build lesson.','Error'); errorBox.innerHTML='<strong>Can\u2019t build this lesson:</strong> '+e.message; errorBox.classList.add('visible'); updateButtons(); } }

const examples={
  plain:'55 + 45\n100',
  abs:'|3 - 4| + 5\n|-1| + 5\n1 + 5\n6',
  paren:'2(x + 3) = 10\n2x + 6 = 10\n2x = 10 - 6\n2x = 4\nx = 2',
  ineqPos:'2x + 1 <= 7\n2x <= 7 - 1\n2x <= 6\nx <= 3',
  ineqNeg:'-2x < 6\nx > -3',
  nested:'2(2 + (x + 3)) = 10\n2(2 + x + 3) = 10\n2(x + 5) = 10\n2x + 10 = 10\n2x = 0\nx = 0',
  quad:'49 - x^2\n7^2 - x^2\n(7 - x) * (7 + x)\n(7 + x) * (7 - x)',
  squareIneq:'(x+4)^2 - (14x+3)/2 - (2-x)^2 > 2x\n2(x+4)^2 - (14x+3) - 2(2-x)^2 > 4x\n2(x^2+8x+16) - (14x+3) - 2(x^2-4x+4) > 4x\n2x^2+16x+32 - 14x-3 - 2x^2+8x-8 > 4x\n10x+21 > 4x\n6x > -21\nx > -7/2',
  lazy:'2025 - 225*(-1//5)\n2025 - (-225//5)\n2025 - (-45)\n2025 + 45\n2070',
  addFrac:'(7//13 + 2//13) + (1//13 + 8//13)\n9//13 + 9//13\n18//13',
  autofill:'2x + 3x + 3 - 4 = 6\n5x = 7',
  likeTerms:'2x + 3x - 4 = 6\n5x - 4 = 6\n5x = 6 + 4\n5x = 10\nx = 2',
  bad:'-2x < 6\nx < -3'
};
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{ statesInput.value=examples[c.dataset.example]; build(); }));
btnBuild.addEventListener('click',build);
btnNext.addEventListener('click',next);
btnPrev.addEventListener('click',prev);
btnReplay.addEventListener('click',replay);
document.addEventListener('keydown',e=>{ if(e.target===statesInput) return; if(e.key==='ArrowRight') next(); if(e.key==='ArrowLeft') prev(); });
build();
</script>
</body>
