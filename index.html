<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equation Step Engine</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>Equation Step Engine</h1>
  <p>Give it the states &mdash; it infers and animates the steps in between</p>
</header>
<div class="author">
  <label for="statesInput">States, one per line. Supports <code>=</code> <code>&lt;</code> <code>&gt;</code> <code>&lt;=</code> <code>&gt;=</code>, fractions <code>1/2</code>, absolute value <code>|3-4|</code>, eager fractions <code>1/2</code> vs lazy <code>1//2</code>, multiplication <code>*</code>, and powers <code>x^2</code>:</label>
  <textarea id="statesInput" spellcheck="false">2(2 + (x + 3)) = 10
2(2 + x + 3) = 10
2(x + 5) = 10
2x + 10 = 10
2x = 0
x = 0</textarea>
  <div class="author-row">
    <button class="chip" data-example="plain">Plain</button>
    <button class="chip" data-example="abs">Absolute value</button>
    <button class="chip" data-example="paren">Brackets</button>
    <button class="chip" data-example="ineqPos">Inequality</button>
    <button class="chip" data-example="ineqNeg">Negative flip</button>
    <button class="chip" data-example="nested">Nested brackets</button>
    <button class="chip" data-example="quad">Difference of squares</button>
    <button class="chip" data-example="squareIneq">Squared binomials</button>
    <button class="chip" data-example="lazy">Lazy arithmetic</button>
    <button class="chip" data-example="addFrac">Add fractions</button>
    <button class="chip" data-example="varFrac">Variable fractions</button>
    <button class="chip" data-example="zeroProd">Quadratic (zero product)</button>
    <button class="chip" data-example="absEq">Absolute value</button>
    <button class="chip" data-example="autofill">Auto-fill</button>
    <button class="chip" data-example="likeTerms">Like terms</button>
    <button class="chip" data-example="bad">Catch a mistake</button>
    <span class="spacer"></span>
    <button id="btnBuild" class="primary">Build lesson</button>
  </div>
</div>
<div class="error-box" id="errorBox"></div>
<div class="stage-wrap">
  <div class="stage" id="stage">
    <div class="op-badge" id="opBadge"></div>
    <svg class="arrow-layer" id="arrowLayer">
      <path class="arrow-path" id="arrowPath" d=""></path>
      <polygon class="arrow-head" id="arrowHead" points=""></polygon>
    </svg>
    <div class="equation" id="equation"></div>
  </div>
</div>
<div class="caption" id="caption">
  <span class="badge" id="captionBadge">Start</span>
  <span id="captionText"></span>
</div>
<div class="controls">
  <button id="btnPrev">&#8592; Back</button>
  <div class="dots" id="dots"></div>
  <button id="btnNext" class="primary">Next &#8594;</button>
  <button id="btnReplay">&#8635; Replay</button>
</div>
<script src="engine.js"></script>
<script src="renderer.js"></script>
</body>
</html>
